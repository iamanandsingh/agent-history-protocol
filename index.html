<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AHP — How AI Agents Get a Flight Recorder</title>
<script src="https://cdn.babylonjs.com/babylon.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #08090f; color: #d0d4e0; font-family: -apple-system, 'Segoe UI', 'Helvetica Neue', sans-serif; overflow: hidden; }
  #renderCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; }

  /* ── Title area ─────────────────────────────────────── */
  #title-area {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    text-align: center; padding: 32px 40px 0;
    pointer-events: none;
    background: linear-gradient(180deg, rgba(8,9,15,0.85) 0%, rgba(8,9,15,0.4) 70%, transparent 100%);
    padding-bottom: 60px;
  }
  #step-label {
    font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
    color: #7aa2f7; margin-bottom: 10px;
    transition: opacity 0.4s;
  }
  #title {
    font-size: 32px; font-weight: 700; color: #eef0f6; line-height: 1.25;
    max-width: 700px; margin: 0 auto;
    transition: opacity 0.4s, transform 0.4s;
  }

  /* ── Subtitle area (bottom) ────────────────────────── */
  #subtitle-area {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
    text-align: center; padding: 0 40px 28px;
    pointer-events: none;
    background: linear-gradient(0deg, rgba(8,9,15,0.9) 0%, rgba(8,9,15,0.5) 60%, transparent 100%);
    padding-top: 80px;
  }
  #subs {
    max-width: 660px; margin: 0 auto 16px;
    min-height: 80px; display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .sub-line {
    font-size: 15px; line-height: 1.7; color: #9aa0b8;
    opacity: 0; transform: translateY(8px);
    transition: opacity 0.5s, transform 0.5s;
  }
  .sub-line.visible { opacity: 1; transform: translateY(0); }
  .sub-line.dim { color: #5a6080; font-size: 13px; }
  .sub-line .hl { color: #7aa2f7; font-weight: 600; }
  .sub-line .purple { color: #bb9af7; font-weight: 600; }
  .sub-line .green { color: #9ece6a; }
  .sub-line .amber { color: #e0af68; }
  .sub-line .code { font-family: 'SF Mono', monospace; font-size: 13px; background: rgba(122,162,247,0.08); padding: 1px 6px; border-radius: 3px; }
  .sub-line .red { color: #f07070; }

  /* ── Navigation ─────────────────────────────────────── */
  #nav-row {
    display: flex; align-items: center; justify-content: center; gap: 16px;
    pointer-events: auto;
  }
  .nav-btn {
    width: 40px; height: 40px; border-radius: 50%; border: 1px solid rgba(122,162,247,0.15);
    background: rgba(14,16,26,0.7); color: #6a7090; font-size: 18px;
    cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(8px);
  }
  .nav-btn:hover { border-color: rgba(122,162,247,0.5); color: #c0c8e0; }
  .nav-btn:disabled { opacity: 0.2; cursor: default; }

  #progress-bar { display: flex; gap: 3px; align-items: center; }
  .dot {
    width: 20px; height: 3px; border-radius: 2px; cursor: pointer;
    background: rgba(122,162,247,0.12); transition: all 0.3s;
  }
  .dot.done { background: rgba(122,162,247,0.35); }
  .dot.active { background: #7aa2f7; width: 32px; }

  #step-num { font-family: monospace; font-size: 11px; color: #3a4060; min-width: 40px; text-align: center; }
</style>
</head>
<body>

<canvas id="renderCanvas"></canvas>

<div id="title-area">
  <div id="step-label"></div>
  <div id="title"></div>
</div>

<div id="subtitle-area">
  <div id="subs"></div>
  <div id="nav-row">
    <button class="nav-btn" id="prevBtn" onclick="prev()">&#8592;</button>
    <div id="progress-bar"></div>
    <span id="step-num"></span>
    <button class="nav-btn" id="nextBtn" onclick="next()">&#8594;</button>
  </div>
</div>

<script>
// ─── Content ────────────────────────────────────────────────────────────
const steps = [
  {
    label: "The Problem",
    title: "Your AI agent did something wrong.\nCan you prove what happened?",
    subs: [
      {text: 'Your AI email assistant deletes messages, sends unauthorized replies, books wrong meetings.', delay: 500},
      {text: 'You ask: <span class="hl">"What happened and why?"</span>', delay: 1200},
      {text: 'Today there\'s no standard answer. No log. No history. No proof.', delay: 2000},
      {text: '<span class="dim">Airplanes have flight recorders. AI agents have nothing — until now.</span>', delay: 3000},
    ],
    scene: "problem"
  },
  {
    label: "The Solution",
    title: "AHP is a flight recorder for AI agents",
    subs: [
      {text: 'Every time an agent acts — calls a tool, thinks via an LLM, sends a message — AHP creates a <span class="hl">record</span>.', delay: 400},
      {text: 'Each record is small (~200 bytes) and <span class="hl">chained</span> to the previous one.', delay: 1200},
      {text: 'Think of it as numbered receipts, each sealed to the one before it.', delay: 2000},
      {text: '<span class="dim">Remove or change any receipt → the seal breaks → tampering detected.</span>', delay: 2800},
    ],
    scene: "records"
  },
  {
    label: "Core Concept",
    title: "The Hash Chain",
    subs: [
      {text: 'Each record stores a <span class="green">SHA-256 hash</span> (a mathematical fingerprint) of the previous record.', delay: 400},
      {text: '<span class="code">Record 1</span> → fingerprint → <span class="code">Record 2</span> → fingerprint → <span class="code">Record 3</span>', delay: 1200},
      {text: 'Change Record 2? Its fingerprint changes. But Record 3 stored the <span class="amber">old</span> fingerprint.', delay: 2200},
      {text: '<span class="red">The whole chain after the change breaks.</span> Tampering is immediately detectable.', delay: 3200},
      {text: '<span class="dim">Like a notebook where each page has a photo of the previous page taped to it.</span>', delay: 4200},
    ],
    scene: "chain"
  },
  {
    label: "Agent Reasoning",
    title: "Not just WHAT — but WHY",
    subs: [
      {text: 'Most logs only record actions: <span class="dim">"called send_email at 3:42pm"</span>', delay: 400},
      {text: 'AHP also records the <span class="purple">LLM thinking step</span> — what the AI considered and decided.', delay: 1200},
      {text: 'Each tool call points back to the <span class="purple">INFERENCE</span> that caused it → a decision tree.', delay: 2200},
      {text: '<span class="hl">User</span>: "fix the bug" → <span class="purple">LLM thinks</span> → searches code → <span class="purple">LLM thinks</span> → edits file → <span class="purple">LLM thinks</span> → runs tests', delay: 3200},
      {text: '<span class="dim">Now you can answer: "Why did the agent edit that file?" — because it found the bug on line 42.</span>', delay: 4200},
    ],
    scene: "reasoning"
  },
  {
    label: "Evidence Store",
    title: "Fingerprints in the chain.\nActual data in the evidence store.",
    subs: [
      {text: 'The chain stores <span class="green">hashes</span> (fingerprints) of inputs/outputs — not the actual data.', delay: 400},
      {text: 'The actual content goes into a separate <span class="hl">evidence store</span>, linked by the same hash.', delay: 1200},
      {text: 'Chain = bank statement (lists transactions). Evidence = actual receipts (the details).', delay: 2200},
      {text: 'You can verify them: re-hash the evidence file → compare to the chain → <span class="green">must match</span>.', delay: 3200},
      {text: '<span class="dim">Evidence recording is optional. Some agents store everything. Others store only hashes.</span>', delay: 4000},
    ],
    scene: "evidence"
  },
  {
    label: "Privacy",
    title: "Sensitive data never enters the record",
    subs: [
      {text: 'What if the input contains a credit card number or SSN?', delay: 400},
      {text: '<span class="amber">PII filters</span> run BEFORE hashing: <span class="code">"Charge 4111-2222-3333-4444"</span>', delay: 1200},
      {text: 'Becomes: <span class="code">"Charge <span class="amber">[REDACTED:CC]</span>"</span> → then this version gets hashed.', delay: 2200},
      {text: 'The credit card number <span class="hl">never touches the chain or evidence store</span>.', delay: 3200},
      {text: '<span class="dim">Built-in presets: PCI (cards), PII-US (SSN), HIPAA (medical), credentials (API keys).</span>', delay: 4000},
    ],
    scene: "filters"
  },
  {
    label: "The Trust Problem",
    title: "Who watches the watcher?",
    subs: [
      {text: 'The hash chain is created by the <span class="hl">operator</span> — the person running the agent.', delay: 400},
      {text: 'If they wanted to cheat, they could delete the chain and rebuild a fake one.', delay: 1200},
      {text: 'A diary you wrote yourself <span class="amber">proves nothing to a skeptic</span>.', delay: 2200},
      {text: 'That\'s why AHP has <span class="hl">three trust levels</span> — each makes cheating harder:', delay: 3000},
      {text: '<span class="hl">L1</span>: Hash chain &nbsp;→&nbsp; <span class="purple">L2</span>: + Signatures &nbsp;→&nbsp; <span class="green">L3</span>: + Witnesses', delay: 3800},
    ],
    scene: "trust"
  },
  {
    label: "Witnesses",
    title: "A notary for your AI agent",
    subs: [
      {text: 'At Level 3, the agent sends <span class="green">checkpoints</span> to an independent witness service.', delay: 400},
      {text: 'Agent: <span class="green">"My chain has 500 records, hash = a7f3... here\'s my signature."</span>', delay: 1400},
      {text: 'Witness: <span class="amber">"Confirmed at 3:42pm. Here\'s MY signature."</span>', delay: 2400},
      {text: 'Now the agent <span class="red">can\'t rewrite anything before record #500</span> — the witness has proof.', delay: 3400},
      {text: '<span class="dim">Like a notary public: stamps your document with their seal. You can\'t change it after.</span>', delay: 4200},
    ],
    scene: "witness"
  },
  {
    label: "Configuration",
    title: "Different agents, different policies",
    subs: [
      {text: 'A customer support chatbot needs <span class="green">full recording + witnesses</span>.', delay: 400},
      {text: 'A code assistant might only need <span class="hl">basic hash chain logging</span>.', delay: 1200},
      {text: 'One config file — <span class="code">ahp.yaml</span> — controls everything per agent.', delay: 2000},
      {text: 'When the agent starts, it writes a <span class="hl">BootRecord</span> documenting its recording policy.', delay: 2800},
      {text: '<span class="dim">An auditor sees: "this agent was configured NOT to record reasoning" — not a gap, a policy.</span>', delay: 3600},
    ],
    scene: "config"
  },
  {
    label: "The Big Picture",
    title: "What this makes possible",
    subs: [
      {text: '<span class="hl">Debugging</span>: "Why did the agent do that?" — trace the full decision tree.', delay: 400},
      {text: '<span class="hl">Compliance</span>: "Show everything your AI did to this customer" — export the chain.', delay: 1200},
      {text: '<span class="hl">Accountability</span>: "Can you prove it?" — Level 3 witnesses verify independently.', delay: 2000},
      {text: 'AHP is an <span class="green">open protocol</span> (Apache 2.0). Not a blockchain. Not tamper-proof — <span class="amber">tamper-evident</span>.', delay: 3000},
      {text: '<span class="dim">The goal: every AI agent records its actions and reasoning in one verifiable format.</span>', delay: 4000},
    ],
    scene: "bigpicture"
  }
];

// ─── Babylon Setup ──────────────────────────────────────────────────────
const canvas = document.getElementById("renderCanvas");
const engine = new BABYLON.Engine(canvas, true, {antialias:true});
let scene, camera, timers = [], meshes = [];
let currentStep = 0;

function clear() {
  timers.forEach(t => clearTimeout(t));
  timers = [];
  meshes.forEach(m => { try { if(!m.isDisposed()) m.dispose(); } catch(e){} });
  meshes = [];
  if (scene) scene.dispose();
}

function init3D() {
  scene = new BABYLON.Scene(engine);
  scene.clearColor = new BABYLON.Color4(0.031, 0.035, 0.059, 1);
  camera = new BABYLON.ArcRotateCamera("c", -Math.PI/2, Math.PI/2.2, 32, BABYLON.Vector3.Zero(), scene);
  camera.attachControl(canvas, true);
  camera.panningSensibility = 0;
  camera.lowerRadiusLimit = 16;
  camera.upperRadiusLimit = 55;
  camera.wheelPrecision = 20;
  const h = new BABYLON.HemisphericLight("h", new BABYLON.Vector3(0,1,0.3), scene);
  h.intensity = 0.45;
  h.groundColor = new BABYLON.Color3(0.04,0.04,0.08);
  const p = new BABYLON.PointLight("p", new BABYLON.Vector3(5,12,-8), scene);
  p.intensity = 0.5;
  p.diffuse = new BABYLON.Color3(0.5,0.55,0.9);
}

// ─── 3D Helpers ─────────────────────────────────────────────────────────
function M(n,r,g,b,e=0.25) {
  const m = new BABYLON.StandardMaterial(n,scene);
  m.diffuseColor = new BABYLON.Color3(r,g,b);
  m.emissiveColor = new BABYLON.Color3(r*e,g*e,b*e);
  m.specularColor = new BABYLON.Color3(0.08,0.08,0.12);
  return m;
}

function B(x,y,w,h,d,m,delay=0) {
  const b = BABYLON.MeshBuilder.CreateBox("b"+Math.random(),{width:w,height:h,depth:d},scene);
  b.position = new BABYLON.Vector3(x,y,0);
  b.material = m;
  b.scaling = new BABYLON.Vector3(0.01,0.01,0.01);
  meshes.push(b);
  timers.push(setTimeout(()=>{
    const a = new BABYLON.Animation("s","scaling",60,BABYLON.Animation.ANIMATIONTYPE_VECTOR3,BABYLON.Animation.ANIMATIONLOOPMODE_CONSTANT);
    a.setKeys([{frame:0,value:new BABYLON.Vector3(0.01,0.01,0.01)},{frame:10,value:new BABYLON.Vector3(1.06,1.06,1.06)},{frame:15,value:new BABYLON.Vector3(1,1,1)}]);
    scene.beginDirectAnimation(b,[a],0,15,false);
  },delay));
  return b;
}

function S(x,y,diam,m,delay=0) {
  const s = BABYLON.MeshBuilder.CreateSphere("s"+Math.random(),{diameter:diam},scene);
  s.position = new BABYLON.Vector3(x,y,0);
  s.material = m;
  meshes.push(s);
  if(delay>0){s.scaling=new BABYLON.Vector3(0.01,0.01,0.01);timers.push(setTimeout(()=>{
    const a=new BABYLON.Animation("s","scaling",60,BABYLON.Animation.ANIMATIONTYPE_VECTOR3,BABYLON.Animation.ANIMATIONLOOPMODE_CONSTANT);
    a.setKeys([{frame:0,value:new BABYLON.Vector3(0.01,0.01,0.01)},{frame:12,value:new BABYLON.Vector3(1,1,1)}]);
    scene.beginDirectAnimation(s,[a],0,12,false);
  },delay));}
  return s;
}

function L(pts,r,g,b,a=0.35,delay=0) {
  timers.push(setTimeout(()=>{
    const l = BABYLON.MeshBuilder.CreateLines("l"+Math.random(),{points:pts.map(p=>new BABYLON.Vector3(p[0],p[1],p[2]||0))},scene);
    l.color = new BABYLON.Color3(r,g,b); l.alpha = a;
    meshes.push(l);
  },delay));
}

function T(txt,x,y,color,size,mw) {
  const w=mw||Math.max(200,txt.length*size*0.65);
  const p=BABYLON.MeshBuilder.CreatePlane("t"+Math.random(),{width:w/55,height:size*2/55},scene);
  p.position=new BABYLON.Vector3(x,y,0);
  p.billboardMode=BABYLON.Mesh.BILLBOARDMODE_ALL;
  const tx=new BABYLON.DynamicTexture("d"+Math.random(),{width:w,height:Math.round(size*2)},scene);
  const ctx=tx.getContext();
  ctx.font=`${size>18?'bold ':''}${size}px -apple-system,sans-serif`;
  ctx.fillStyle=color;ctx.textAlign="center";
  ctx.fillText(txt,w/2,size*1.4);tx.update();
  const m=new BABYLON.StandardMaterial("m"+Math.random(),scene);
  m.diffuseTexture=tx;m.emissiveTexture=tx;m.opacityTexture=tx;
  m.backFaceCulling=false;m.disableLighting=true;p.material=m;
  meshes.push(p); return p;
}

function pulse(mesh,min=0.96,max=1.04,spd=60){
  const a=new BABYLON.Animation("p","scaling",30,BABYLON.Animation.ANIMATIONTYPE_VECTOR3,BABYLON.Animation.ANIMATIONLOOPMODE_CYCLE);
  a.setKeys([{frame:0,value:new BABYLON.Vector3(min,min,min)},{frame:spd/2,value:new BABYLON.Vector3(max,max,max)},{frame:spd,value:new BABYLON.Vector3(min,min,min)}]);
  scene.beginDirectAnimation(mesh,[a],0,spd,true);
}

function float(mesh,r=0.25,spd=80){
  const base=mesh.position.y;
  const a=new BABYLON.Animation("f","position.y",30,BABYLON.Animation.ANIMATIONTYPE_FLOAT,BABYLON.Animation.ANIMATIONLOOPMODE_CYCLE);
  a.setKeys([{frame:0,value:base},{frame:spd/2,value:base+r},{frame:spd,value:base}]);
  scene.beginDirectAnimation(mesh,[a],0,spd,true);
}

// ─── Scene Builders ─────────────────────────────────────────────────────

function scene_problem() {
  init3D(); camera.radius=30; camera.beta=Math.PI/2.3;
  const agent = B(0,0,2.2,3,1.5,M("a",0.35,0.45,0.85,0.3),100);
  T("AI Agent",0,2.8,"#7aa2f7",20);
  pulse(agent);
  const acts=[
    {x:-6.5,y:3.5,t:"Delete email",c:[0.85,0.3,0.3]},
    {x:5.5,y:4,t:"Send reply",c:[0.85,0.3,0.3]},
    {x:-5.5,y:-2.5,t:"Book meeting",c:[0.85,0.3,0.3]},
    {x:7,y:-1.5,t:"Read calendar",c:[0.45,0.55,0.75]},
    {x:-7.5,y:1,t:"Search inbox",c:[0.45,0.55,0.75]},
    {x:3,y:-4,t:"Query database",c:[0.45,0.55,0.75]},
  ];
  acts.forEach((a,i)=>{
    const b=B(a.x,a.y,2.6,0.75,0.7,M("am"+i,...a.c,0.25),300+i*250);
    timers.push(setTimeout(()=>{T(a.t,a.x,a.y+0.7,"#b0b8cc",11,180);float(b,0.2,65+i*12);},400+i*250));
  });
  timers.push(setTimeout(()=>{
    T("?",  -2.5, -6, "#e0af68", 40);
    T("?",   2.5, -6, "#e0af68", 40);
  },2200));
}

function scene_records() {
  init3D(); camera.radius=32; camera.beta=Math.PI/2.15;
  const agent=B(-11,0,1.6,2.5,1.2,M("a",0.35,0.45,0.85,0.3),100);
  T("Agent",-11,2,"#7aa2f7",16);
  const types=[
    {t:"BOOT",c:[0.478,0.82,0.835]},
    {t:"INFERENCE",c:[0.733,0.604,0.969]},
    {t:"TOOL_CALL",c:[0.478,0.635,0.969]},
    {t:"TOOL_CALL",c:[0.478,0.635,0.969]},
    {t:"CHECKPOINT",c:[0.62,0.808,0.416]},
    {t:"TOOL_CALL",c:[0.478,0.635,0.969]},
  ];
  types.forEach((r,i)=>{
    const x=-7+i*3.6;
    B(x,0,2.2,1.3,0.8,M("r"+i,...r.c,0.28),300+i*400);
    timers.push(setTimeout(()=>{
      const col=`rgb(${r.c[0]*255|0},${r.c[1]*255|0},${r.c[2]*255|0})`;
      T(r.t,x,1.3,col,10,160);
      T("#"+(i+1),x,-1.1,"#4a5070",13);
      if(i>0) L([[-7+(i-1)*3.6+1.3,0],[x-1.3,0]],0.3,0.45,0.75,0.3,300+i*400+200);
    },350+i*400));
  });
}

function scene_chain() {
  init3D(); camera.radius=34; camera.beta=Math.PI/2.15;
  const xs=[-9,0,9];
  xs.forEach((x,i)=>{
    B(x,0,4,2.5,1.2,M("c"+i,0.35,0.45,0.75,0.2),200+i*600);
    timers.push(setTimeout(()=>{
      T("Record "+(i+1),x,2.2,"#c8cee0",18);
      if(i===0){
        T("prev_hash: 0x0000...0000",x,-0.1,"#9ece6a",11,280);
        T("(genesis — all zeros)",x,-0.7,"#4a5070",9,180);
      } else {
        T("prev_hash: SHA256(Rec "+i+")",x,-0.1,"#9ece6a",11,280);
      }
      if(i>0){
        L([[xs[i-1]+2.3,0.3],[x-2.3,0.3]],0.55,0.75,0.35,0.45,0);
        T("SHA-256",(xs[i-1]+x)/2,1.2,"#9ece6a",11);
      }
    },300+i*600));
  });
  // Tamper X
  timers.push(setTimeout(()=>{
    const x=S(4.5,0.3,0.7,M("xm",0.9,0.2,0.2,0.7));
    pulse(x,0.7,1.3,25);
    T("BREAK",4.5,-1.2,"#f07070",13);
  },2800));
}

function scene_reasoning() {
  init3D(); camera.radius=32; camera.beta=Math.PI/2.3;
  const nodes=[
    {x:0,y:6,t:"INFERENCE",sub:'"fix the bug"',c:[0.733,0.604,0.969],s:1.3},
    {x:-5,y:3,t:"TOOL_CALL",sub:"grep 'auth'",c:[0.478,0.635,0.969],s:1},
    {x:0,y:3,t:"TOOL_CALL",sub:"read auth.py",c:[0.478,0.635,0.969],s:1},
    {x:5,y:3,t:"TOOL_CALL",sub:"read config.py",c:[0.478,0.635,0.969],s:1},
    {x:0,y:-0.5,t:"INFERENCE",sub:"found bug line 42",c:[0.733,0.604,0.969],s:1.3},
    {x:-3,y:-3.5,t:"TOOL_CALL",sub:"edit auth.py",c:[0.478,0.635,0.969],s:1},
    {x:3,y:-3.5,t:"TOOL_CALL",sub:"run tests",c:[0.478,0.635,0.969],s:1},
  ];
  const links=[[0,1],[0,2],[0,3],[0,4],[4,5],[4,6]];
  nodes.forEach((n,i)=>{
    B(n.x,n.y,2.2*n.s,1*n.s,0.7,M("n"+i,...n.c,0.28),200+i*300);
    timers.push(setTimeout(()=>{
      const col=`rgb(${n.c[0]*255|0},${n.c[1]*255|0},${n.c[2]*255|0})`;
      T(n.t,n.x,n.y+0.8*n.s,col,10,160);
      T(n.sub,n.x,n.y-0.7*n.s,"#7a80a0",9,180);
    },250+i*300));
  });
  links.forEach(([a,b])=>{
    const d=Math.max(a,b)*300+400;

// ─── Navigation ─────────────────────────────────────────────────────────
function render() {
  const step = steps[currentStep];

  // Fade out
  const titleEl = document.getElementById("title");
  const labelEl = document.getElementById("step-label");
  const subsEl = document.getElementById("subs");
  titleEl.style.opacity = "0"; titleEl.style.transform = "translateY(-8px)";
  labelEl.style.opacity = "0";

  setTimeout(() => {
    // Update text
    labelEl.textContent = step.label;
    titleEl.textContent = step.title;
    document.getElementById("step-num").textContent = `${currentStep+1}/${steps.length}`;
    document.getElementById("prevBtn").disabled = currentStep === 0;

    // Progress
    document.getElementById("progress-bar").innerHTML = steps.map((_,i) =>
      `<div class="dot ${i<currentStep?'done':''} ${i===currentStep?'active':''}" onclick="goTo(${i})"></div>`
    ).join("");

    // Fade in title
    titleEl.style.opacity = "1"; titleEl.style.transform = "translateY(0)";
    labelEl.style.opacity = "1";

    // Subtitles
    subsEl.innerHTML = step.subs.map(s => `<div class="sub-line">${s.text}</div>`).join("");
    const lines = subsEl.querySelectorAll(".sub-line");
    step.subs.forEach((s,i) => {
      timers.push(setTimeout(() => { if(lines[i]) lines[i].classList.add("visible"); }, s.delay));
    });

    // 3D scene
    clear();
    builders[step.scene]();
  }, 300);
}

function next() {
  if (currentStep >= steps.length - 1) currentStep = 0; else currentStep++;
  render();
}
function prev() {
  if (currentStep > 0) { currentStep--; render(); }
}
function goTo(i) { currentStep = i; render(); }

window.addEventListener("keydown", e => {
  if (e.key === "ArrowRight" || e.key === " ") { e.preventDefault(); next(); }
  if (e.key === "ArrowLeft") prev();
});

// ─── Init ───────────────────────────────────────────────────────────────
render();
engine.runRenderLoop(() => { if(scene) scene.render(); });
window.addEventListener("resize", () => engine.resize());
</script>
