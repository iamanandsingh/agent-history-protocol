name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"
          pip install pytest-cov

      - name: Run tests with coverage
        run: pytest --cov=ahp --cov-report=xml tests/

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"

      - name: Ruff lint
        run: ruff check ahp/

      - name: Ruff format check
        run: ruff format --check ahp/

      - name: Mypy type check
        run: mypy ahp/ --ignore-missing-imports --python-version 3.9 --exclude _pytest

  build:
    runs-on: ubuntu-latest
    needs: [test-python, lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build wheel

      - name: Build wheel
        run: pip wheel . --no-deps -w dist/

      - name: Install wheel test
        run: |
          pip install dist/*.whl
          python -c "from ahp import AHPRecorder, Protocol, ActionType; print('Public API OK')"
          python -c "import ahp; print(f'Version: {ahp.__version__}')"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/*.whl

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"
          pip install pip-audit

      - name: Run pip-audit
        run: pip-audit

  test-typescript:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk-typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Run tests
        run: node --test dist/*.test.js
