name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e .
          pip install grpcio cryptography

      - name: Run tests
        run: python -m unittest discover tests -v

      - name: Run benchmarks (smoke test)
        run: python benchmarks/bench.py 100

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check syntax
        run: python -m py_compile ahp/recorder.py ahp/async_recorder.py ahp/core/canonical.py ahp/core/chain.py ahp/core/verify.py
